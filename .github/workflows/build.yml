name: Build Windows EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install pyinstaller
      - run: pyinstaller --onefile --name DartCounter "Dart points counter.py"
      - uses: actions/upload-artifact@v3
        with:
          name: DartCounter.exe
          path: dist/DartCounter.exe
